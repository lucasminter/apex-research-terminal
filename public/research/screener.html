<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Screener — Apex Research Hub</title>
  <link rel="stylesheet" href="/research/styles.css" />
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("apex-theme")||"dark");</script>
</head>
<body>
<header data-page="screener"></header>
<script src="/research/components.js"></script>

<main class="container">
  <h1>Stock Screener</h1>
  <p style="color: var(--muted); margin-bottom: 24px;">Search, filter, and rank 250+ stocks across all sectors.</p>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search ticker or company..." style="flex: 1; min-width: 200px;" />
    <select id="sectorFilter">
      <option value="">All Sectors</option>
      <option value="Technology">Technology</option>
      <option value="Communication Services">Communication Services</option>
      <option value="Healthcare">Healthcare</option>
      <option value="Financials">Financials</option>
      <option value="Consumer Discretionary">Consumer Discretionary</option>
      <option value="Consumer Staples">Consumer Staples</option>
      <option value="Industrials">Industrials</option>
      <option value="Energy">Energy</option>
      <option value="Utilities">Utilities</option>
      <option value="Real Estate">Real Estate</option>
    </select>
    <select id="moatFilter">
      <option value="">All Moats</option>
      <option value="Very Wide">Very Wide</option>
      <option value="Wide">Wide</option>
      <option value="Moderate">Moderate</option>
      <option value="Narrow">Narrow</option>
    </select>
    <select id="sortSelect">
      <option value="combined">Sort: Combined Score</option>
      <option value="health">Sort: Health</option>
      <option value="upside">Sort: Upside</option>
      <option value="cap">Sort: Market Cap</option>
      <option value="pe">Sort: Forward P/E</option>
    </select>
    <button class="primary" onclick="resetFilters()">Reset</button>
  </div>

  <div id="statsStrip" class="stats-strip" style="display:none;"></div>
  <div id="resultCount" style="margin-bottom: 16px; font-size: 13px; color: var(--muted);">Loading...</div>
  <div id="stockGrid" class="grid"></div>
</main>

<script src="/research/screener.js"></script>
<script src="/research/theme.js"></script>
</body>
</html>
