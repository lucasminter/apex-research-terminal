<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earnings Calendar — Research Hub</title>
  <link rel="stylesheet" href="/research/styles.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("apex-theme")||"dark");</script>
</head>
<body>
<header data-page=""></header>
<script src="/research/components.js"></script>

  <main class="container">
    <a href="/research/index.html" style="color: var(--accent); text-decoration: none; margin-bottom: 20px; display: inline-block;">← Back to Dashboard</a>

    <h1>📅 Earnings Calendar</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">Upcoming earnings dates, analyst expectations, and historical beat rates</p>

    <div style="display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap;">
      <button class="primary" style="padding: 8px 16px; border: none; background: var(--accent); cursor: pointer; border-radius: 4px; color: white;">This Week</button>
      <button class="primary" style="padding: 8px 16px; border: 1px solid var(--accent); background: transparent; cursor: pointer; border-radius: 4px; color: var(--accent);">Next Week</button>
      <button class="primary" style="padding: 8px 16px; border: 1px solid var(--accent); background: transparent; cursor: pointer; border-radius: 4px; color: var(--accent);">This Month</button>
      <button class="primary" style="padding: 8px 16px; border: 1px solid var(--accent); background: transparent; cursor: pointer; border-radius: 4px; color: var(--accent);">All Upcoming</button>
    </div>

    <div style="overflow-x: auto;">
      <table style="width: 100%; border-collapse: collapse;">
        <thead style="background: var(--surface); border-bottom: 2px solid var(--accent);">
          <tr>
            <th style="padding: 12px; text-align: left; font-weight: 600; color: var(--accent);">Date</th>
            <th style="padding: 12px; text-align: left; font-weight: 600; color: var(--accent);">Ticker</th>
            <th style="padding: 12px; text-align: left; font-weight: 600; color: var(--accent);">Company</th>
            <th style="padding: 12px; text-align: left; font-weight: 600; color: var(--accent);">Sector</th>
            <th style="padding: 12px; text-align: center; font-weight: 600; color: var(--accent);">EPS Est.</th>
            <th style="padding: 12px; text-align: center; font-weight: 600; color: var(--accent);">Revenue Est.</th>
            <th style="padding: 12px; text-align: center; font-weight: 600; color: var(--accent);">Beat Rate</th>
          </tr>
        </thead>
        <tbody id="earningsTable">
          <tr><td colspan="7" style="padding: 40px; text-align: center; color: var(--muted);">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="section" style="margin-top: 40px;">
      <h2 style="margin-bottom: 24px;">Recent Earnings Surprises</h2>
      <div id="earningsSurprises" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;"></div>
    </div>
  </main>

  <footer style="text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--surface); margin-top: 60px;">
    <p>Research Hub v1.0 • Data as of March 6, 2026</p>
  </footer>
<script src="/research/theme.js"></script>
<script src="/research/earnings.js"></script>
</body>
</html>
