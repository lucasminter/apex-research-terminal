<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Dashboard — Research Hub</title>
  <link rel="stylesheet" href="/research/styles.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("apex-theme")||"dark");</script>
</head>
<body>
<header data-page="macro"></header>
<script src="/research/components.js"></script>

  <main class="container">
    <a href="/research/index.html" style="color: var(--accent); text-decoration: none; margin-bottom: 20px; display: inline-block;">← Back to Dashboard</a>

    <h1>📊 Macro Dashboard</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">Monitor macroeconomic indicators and sector rotation signals</p>

    <div class="card" style="margin-bottom:24px;">
      <h3 style="margin-bottom:12px;">🌐 Live Macro Regime Detection</h3>
      <div id="regimeCard" style="color:var(--muted);font-size:12px;">⟳ Detecting regime from FRED + news feeds…</div>
    </div>

    <div id="macroGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px;">
      <div style="padding: 40px; text-align: center; color: var(--muted);">Loading...</div>
    </div>

    <div class="section">
      <h2 style="margin-bottom: 24px;">Sector Rotation Signals</h2>
      <div id="macroRotation" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;"></div>
    </div>
  </main>

  <footer style="text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--surface); margin-top: 60px;">
    <p>Research Hub v1.0 • Data as of March 6, 2026</p>
  </footer>
<script src="/research/theme.js"></script>
<script src="/research/macro.js"></script>
</body>
</html>
