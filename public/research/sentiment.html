<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentiment Analysis — Research Hub</title>
  <link rel="stylesheet" href="/research/styles.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("apex-theme")||"dark");</script>
</head>
<body>
<header data-page=""></header>
<script src="/research/components.js"></script>

  <main class="container">
    <a href="/research/index.html" style="color: var(--accent); text-decoration: none; margin-bottom: 20px; display: inline-block;">← Back to Dashboard</a>

    <h1>💬 Sentiment Analysis</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">Track news, social media, and analyst sentiment across all holdings</p>

    <div style="display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap;">
      <button class="primary" style="padding: 8px 16px; border: none; background: var(--accent); cursor: pointer; border-radius: 4px; color: white;">Most Positive</button>
      <button class="primary" style="padding: 8px 16px; border: 1px solid var(--accent); background: transparent; cursor: pointer; border-radius: 4px; color: var(--accent);">Most Negative</button>
      <button class="primary" style="padding: 8px 16px; border: 1px solid var(--accent); background: transparent; cursor: pointer; border-radius: 4px; color: var(--accent);">Recent Changes</button>
    </div>

    <div class="section">
      <h2 style="margin-bottom: 24px;">Sector Sentiment</h2>
      <div id="sectorSentiment" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
        <div style="padding: 40px; text-align: center; color: var(--muted);">Loading...</div>
      </div>
    </div>

    <div class="section" style="margin-top: 40px;">
      <h2 style="margin-bottom: 24px;">Top Stocks by Sentiment</h2>
      <div id="stockSentiment" class="grid"></div>
    </div>
  </main>

  <footer style="text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--surface); margin-top: 60px;">
    <p>Research Hub v1.0 • Data as of March 6, 2026</p>
  </footer>
<script src="/research/theme.js"></script>
<script src="/research/sentiment.js"></script>
</body>
</html>
