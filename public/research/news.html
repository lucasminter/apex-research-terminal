<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Hub — Research Hub</title>
  <link rel="stylesheet" href="/research/styles.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("apex-theme")||"dark");</script>
</head>
<body>
<header data-page="news"></header>
<script src="/research/components.js"></script>

  <main class="container">
    <a href="/research/index.html" style="color: var(--accent); text-decoration: none; margin-bottom: 20px; display: inline-block;">← Back to Dashboard</a>

    <h1>📰 News Hub</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">Breaking news, earnings, and market-moving events</p>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All News</button>
      <button class="filter-tab" data-filter="Technology">Tech</button>
      <button class="filter-tab" data-filter="Healthcare">Healthcare</button>
      <button class="filter-tab" data-filter="Regulation">Regulation</button>
      <button class="filter-tab" data-filter="Earnings">Earnings</button>
    </div>

    <div class="section">
      <h2 style="margin-bottom: 24px;">Latest News</h2>
      <div id="newsList" style="display: flex; flex-direction: column; gap: 16px;">
        <div style="padding: 40px; text-align: center; color: var(--muted);">Loading...</div>
      </div>
    </div>

    <div class="section" style="margin-top: 40px;">
      <h2 style="margin-bottom: 24px;">Market Commentary</h2>
      <div id="newsCommentary" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px;"></div>
    </div>
  </main>

  <footer style="text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--surface); margin-top: 60px;">
    <p>Research Hub v1.0 • Data as of March 6, 2026</p>
  </footer>
<script src="/research/theme.js"></script>
<script src="/research/news.js"></script>
</body>
</html>
